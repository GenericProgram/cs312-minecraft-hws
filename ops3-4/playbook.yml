---
- name: Bootstrap k3s and Deploy Minecraft on Kubernetes
  hosts: all
  become: yes
  vars:
    aws_region: "us-east-1"
    aws_account_id: "998487032255"
    ecr_repo_name: "minecraft-server"
    image_tag: "v1.20.4"
    s3_backup_bucket: "ops3-minecraft-bucket"
    ecr_registry: "{{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com"
    minecraft_image: "{{ ecr_registry }}/{{ ecr_repo_name }}:{{ image_tag }}"
    data_dir: "/opt/minecraft-data"
    manifest_dir: "/opt/minecraft-k8s"

  tasks:
    # ── Prerequisites ──────────────────────────────────────────────────────────

    - name: Update apt cache and install prerequisites
      apt:
        name:
          - awscli
          - curl
          - python3-pip
        state: present
        update_cache: yes

    # ── Restore world data from S3 before k3s starts the pod ──────────────────

    - name: Ensure Minecraft data directory exists
      file:
        path: "{{ data_dir }}"
        state: directory
        mode: '0755'

    - name: Restore world data from S3 (idempotent sync)
      command: aws s3 sync s3://{{ s3_backup_bucket }}/ {{ data_dir }}/
      register: s3_sync_result
      changed_when: "'download' in s3_sync_result.stdout"

    # ── Install k3s ────────────────────────────────────────────────────────────

    - name: Check if k3s is already installed
      stat:
        path: /usr/local/bin/k3s
      register: k3s_binary

    - name: Install k3s (single-node, no Traefik — we use ServiceLB only)
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_EXEC="--disable traefik" sh -
      when: not k3s_binary.stat.exists

    - name: Wait for k3s to be ready
      command: k3s kubectl get nodes
      register: k3s_ready
      retries: 20
      delay: 10
      until: k3s_ready.rc == 0

    # ── Configure ECR credential provider for containerd ──────────────────────
    # Uses the IAM instance profile — no hardcoded credentials anywhere.
    # Binary source: dntosas/ecr-credential-provider (the upstream
    # kubernetes/cloud-provider-aws repo does not ship prebuilt binaries).

    - name: Create kubelet credential provider directory
      file:
        path: /usr/local/bin
        state: directory
        mode: '0755'

    - name: Download ECR credential provider plugin
      get_url:
        url: "https://github.com/dntosas/ecr-credential-provider/releases/download/v1.2.0/ecr-credential-provider-linux-amd64"
        dest: /usr/local/bin/ecr-credential-provider
        mode: '0755'

    - name: Ensure /etc/kubernetes directory exists
      file:
        path: /etc/kubernetes
        state: directory
        mode: '0755'

    - name: Write credential provider config
      copy:
        dest: /etc/kubernetes/ecr-credential-provider.json
        content: |
          {
            "providers": [
              {
                "name": "ecr-credential-provider",
                "matchImages": [
                  "*.dkr.ecr.*.amazonaws.com"
                ],
                "apiVersion": "credentialprovider.kubelet.k8s.io/v1",
                "defaultCacheDuration": "12h"
              }
            ]
          }

    - name: Write k3s config with credential provider kubelet args
      copy:
        dest: /etc/rancher/k3s/config.yaml
        content: |
          disable: traefik
          kubelet-arg:
            - "image-credential-provider-config=/etc/kubernetes/ecr-credential-provider.json"
            - "image-credential-provider-bin-dir=/usr/local/bin"
      notify: Restart k3s

    - name: Flush handlers to restart k3s now if config changed
      meta: flush_handlers

    - name: Wait for k3s to be ready after restart
      command: k3s kubectl get nodes
      register: k3s_ready2
      retries: 20
      delay: 10
      until: k3s_ready2.rc == 0

    # ── Copy Kubernetes manifests to host ─────────────────────────────────────

    - name: Ensure manifest directory exists
      file:
        path: "{{ manifest_dir }}"
        state: directory
        mode: '0755'

    - name: Copy all Kubernetes manifests
      copy:
        src: "k8s/{{ item }}"
        dest: "{{ manifest_dir }}/{{ item }}"
        mode: '0644'
      loop:
        - configmap.yml
        - pvc.yml
        - deployment.yml
        - service.yml
        - backup-cronjob.yml

    # ── Apply manifests ────────────────────────────────────────────────────────

    - name: Wait for k3s API server to be fully ready before applying manifests
      command: k3s kubectl get serviceaccount default -n default
      register: api_ready
      retries: 30
      delay: 10
      until: api_ready.rc == 0

    - name: Apply Kubernetes manifests
      command: k3s kubectl apply -f {{ manifest_dir }}/{{ item }} --validate=false
      loop:
        - configmap.yml
        - pvc.yml
        - deployment.yml
        - service.yml
        - backup-cronjob.yml

    - name: Wait for Minecraft pod to be running
      command: >
        k3s kubectl wait --for=condition=ready pod
        -l app=minecraft
        --timeout=300s
      register: pod_ready
      retries: 3
      delay: 30
      until: pod_ready.rc == 0

  handlers:
    - name: Restart k3s
      systemd:
        name: k3s
        state: restarted
        daemon_reload: yes
