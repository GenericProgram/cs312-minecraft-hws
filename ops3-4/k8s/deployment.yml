apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-server
  namespace: default
  labels:
    app: minecraft
spec:
  #Multiple replicas would split world state, so we intentionally stay at 1.
  replicas: 1
  selector:
    matchLabels:
      app: minecraft
  strategy:
    #Recreate stops the old pod before starting the new one.
    #This prevents two Minecraft processes from simultaneously holding
    #the same PVC
    type: Recreate
  template:
    metadata:
      labels:
        app: minecraft
    spec:
      containers:
        - name: minecraft
          #Pinned ECR image tag
          image: 998487032255.dkr.ecr.us-east-1.amazonaws.com/minecraft-server:v1.20.4
          ports:
            - containerPort: 25565
              protocol: TCP

          envFrom:
            - configMapRef:
                name: minecraft-config

          #Resource controls.
          resources:
            requests:
              memory: "2Gi"
              cpu: "1000m"
            limits:
              memory: "2500Mi"
              cpu: "2000m"

          #startupProbe: allows up to 10 * 30s = 300s for initial startup.
          #Once it succeeds once, Kubernetes hands off to liveness/readiness.
          startupProbe:
            tcpSocket:
              port: 25565
            failureThreshold: 10
            periodSeconds: 30

          #livenessProbe: restarts the container if the TCP port stops responding.
          livenessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 0  # startupProbe gates this
            periodSeconds: 30
            failureThreshold: 3

          #readinessProbe: gates Service traffic until the port is open.
          readinessProbe:
            tcpSocket:
              port: 25565
            initialDelaySeconds: 0  # startupProbe gates this
            periodSeconds: 20
            failureThreshold: 3

          #Persistent Volume Mount
          volumeMounts:
            - name: world-data
              mountPath: /data

      volumes:
        - name: world-data
          persistentVolumeClaim:
            claimName: minecraft-world-pvc
