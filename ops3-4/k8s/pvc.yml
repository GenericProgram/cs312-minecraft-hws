apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minecraft-world-pvc
  namespace: default
spec:
  # k3s ships with the 'local-path' storage class by default.
  # It provisions volumes on the node's local disk under /var/lib/rancher/k3s/storage/.
  # This is sufficient for a single-node setup; data survives pod deletion
  # as long as the node itself is not terminated.
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
